<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provideo Media Holding</title>
  <meta name="description" content="Simple video and photo storage with online viewing and public links">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" sizes="16x16"
    href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAABOUlEQVR4nN2VTUoDQRCFv+AfWRiXnsAfUK8gcaMRRNQLKbqKMR7AuNbcx7jRuFJBBV1p3KkUvIGy03TGATfzoKDn1euqrpqmGsqOSaCi9QrQB26BZXEVaQphD+hoPQM8At+yB6Am3zmw+5fAdqpTBVoXd+SCZ3YgX0PfbVdtEm1teAXGZC+RBE/yjQNv4lqjgm+7AJfi1iLBM6tL03Wctbak6Ablz4m/TrSoJ81CwGft/YW7QDQr3l/P0MyHtJ63WEMYBKIp8Z+JBOZDWs9brCF8FEgwkKYa8O//3aJ+np88L76XSHAlzWLAX1BaNICv4C7XEy1ajbR3a1SSVmTYPeccds08VdjIPdGGDXGHkQT78m2q6uO84zrDDnCmdS24rvfAtHwdTeFCmHCnsmfSnssbYMlVa5oS4wffWayyDUi0NgAAAABJRU5ErkJggg==">
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7" />
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
          </svg>
          <a href="/" style="text-decoration: none;" class="logo-text">Provideo Media Holding</a>
        </div>
        <div class="header-stats" id="headerStats"></div>
        <div class="user-profile" id="userProfile"
          style="margin-left: 20px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-secondary);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span id="usernameDisplay">...</span>
        </div>
        <button class="icon-btn" id="addUserBtn" onclick="openAddUserModal()" title="Add User"
          style="margin-left: 12px; display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
          </svg>
        </button>
        <button class="icon-btn" id="settingsBtn" onclick="openSettingsModal()" title="Settings"
          style="margin-left: 12px; display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
        <button class="icon-btn" onclick="logout()" title="Logout" style="margin-left: 12px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Upload Zone -->
    <section class="upload-section">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </div>
        <p class="upload-text">Drag and drop video and photo files here</p>
        <p class="upload-subtext">or</p>
        <label class="upload-btn" for="fileInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Select files
        </label>
        <input type="file" id="fileInput" multiple accept="video/*,image/*" hidden>
        <p class="upload-hint">Video and photo files up to 2 GB • Up to 50 files at once</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-info">
          <span id="progressText">Uploading...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </section>

    <!-- Video Grid -->
    <section class="videos-section">
      <div class="videos-header">
        <div class="videos-title-area" style="display: flex; flex-direction: column; gap: 4px;">
          <h2 class="videos-title" style="margin-bottom: 0;">My files</h2>
          <div class="breadcrumbs" id="breadcrumbs">
            <span class="crumb active" onclick="navigateTo(null, 'Root')">Root</span>
          </div>
        </div>
        <div class="videos-actions" style="display: flex; align-items: center; gap: 16px;">
          <input type="search" id="searchInput" name="q" placeholder="Search files & folders" autocomplete="off"
            style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-size: 14px; width: 250px;">
          <button class="icon-btn" onclick="openFolderModal()" title="Create Folder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
            New Folder
          </button>
          <div class="videos-count" id="videosCount"></div>
        </div>
      </div>
      <div class="videos-grid" id="videosGrid">
        <!-- Видео карточки рендерятся через JS -->
      </div>
      <div class="empty-state" id="emptyState" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <polygon points="23 7 16 12 23 17 23 7" />
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
        </svg>
        <p>No uploaded files</p>
        <span>Drag files to the area above or click "Select files"</span>
      </div>
    </section>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal" style="display: none;">
    <div class="modal">
      <h3>Rename</h3>
      <input type="text" class="modal-input" id="renameInput" placeholder="New name" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeRenameModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmRename()">Save</button>
      </div>
    </div>
  </div>

  <!-- Expire Modal -->
  <div class="modal-overlay" id="expireModal" style="display: none;">
    <div class="modal">
      <h3>Set Expiration Date</h3>
      <input type="date" class="modal-input" id="expireInput" style="margin-bottom: 24px;">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeExpireModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmExpire()">Save</button>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal-overlay" id="addUserModal" style="display: none;">
    <div class="modal">
      <h3>Add New User</h3>
      <input type="text" class="modal-input" id="newUsernameInput" placeholder="Username" style="margin-bottom: 12px;"
        autocomplete="off">
      <input type="password" class="modal-input" id="newUserPasswordInput" placeholder="Password"
        autocomplete="new-password">
      <div class="modal-actions" style="margin-top: 16px;">
        <button class="modal-btn modal-btn-cancel" onclick="closeAddUserModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmAddUser()">Create</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display: none;">
    <div class="modal">
      <h3>Settings</h3>
      <div class="login-field" style="text-align: left; margin-bottom: 0;">
        <label for="siteTitleInput"
          style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500;">Site
          Title</label>
        <input type="text" class="modal-input" id="siteTitleInput" placeholder="Site Title" autocomplete="off"
          style="margin-bottom: 12px; width: 100%; box-sizing: border-box; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 15px;">
      </div>
      <div class="modal-actions" style="margin-top: 16px;">
        <button class="modal-btn modal-btn-cancel" onclick="closeSettingsModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Create Folder Modal -->
  <div class="modal-overlay" id="folderModal" style="display: none;">
    <div class="modal">
      <h3 id="folderModalTitle">Folder</h3>
      <input type="text" class="modal-input" id="folderInput" placeholder="Folder name" autocomplete="off"
        onkeydown="if(event.key === 'Enter') confirmCreateFolder(); if(event.key === 'Escape') closeFolderModal();">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeFolderModal()">Cancel</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmCreateFolder()">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>

</html>
