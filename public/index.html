<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Storage — Видео хранилище</title>
  <meta name="description" content="Простое хранилище видео файлов с онлайн-воспроизведением и публичными ссылками">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7" />
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
          </svg>
          <span class="logo-text">Media Storage</span>
        </div>
        <div class="header-stats" id="headerStats"></div>
        <button class="icon-btn" onclick="logout()" title="Выйти" style="margin-left: 12px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Upload Zone -->
    <section class="upload-section">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
        </div>
        <p class="upload-text">Перетащите видео файлы сюда</p>
        <p class="upload-subtext">или</p>
        <label class="upload-btn" for="fileInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Выбрать файлы
        </label>
        <input type="file" id="fileInput" multiple accept="video/*" hidden>
        <p class="upload-hint">Видео файлы до 2 ГБ • До 50 файлов за раз</p>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container" id="progressContainer" style="display: none;">
        <div class="progress-info">
          <span id="progressText">Загрузка...</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </section>

    <!-- Video Grid -->
    <section class="videos-section">
      <div class="videos-header">
        <h2 class="videos-title">Мои видео</h2>
        <div class="videos-count" id="videosCount"></div>
      </div>
      <div class="videos-grid" id="videosGrid">
        <!-- Видео карточки рендерятся через JS -->
      </div>
      <div class="empty-state" id="emptyState" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <polygon points="23 7 16 12 23 17 23 7" />
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
        </svg>
        <p>Нет загруженных видео</p>
        <span>Перетащите файлы в область выше или нажмите «Выбрать файлы»</span>
      </div>
    </section>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal" style="display: none;">
    <div class="modal">
      <h3>Переименовать</h3>
      <input type="text" class="modal-input" id="renameInput" placeholder="Новое название">
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" onclick="closeRenameModal()">Отмена</button>
        <button class="modal-btn modal-btn-confirm" onclick="confirmRename()">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>

</html>
