<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File — Provideo Media Holding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .nav-arrow {
            display: none;
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: background 0.2s, transform 0.2s;
        }

        .nav-arrow:hover {
            background: rgba(100, 108, 255, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-arrow.prev {
            left: 16px;
        }

        .nav-arrow.next {
            right: 16px;
        }

        .nav-arrow.visible {
            display: flex;
        }

        .swipe-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .swipe-hint.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="app share-page">
        <header class="share-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                <span class="logo-text">Provideo Media Holding</span>
            </div>
        </header>

        <!-- Navigation arrows -->
        <button class="nav-arrow prev" id="navPrev" title="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <button class="nav-arrow next" id="navNext" title="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                <polyline points="9 6 15 12 9 18" />
            </svg>
        </button>
        <div class="swipe-hint" id="swipeHint">← Swipe to navigate →</div>

        <main class="share-main">
            <div class="share-player-wrap" style="position: relative;">
                <video id="shareVideo" controls autoplay style="display: none;">
                    Your browser does not support video playback.
                </video>
                <img id="shareImage" style="display: none; width: 100%; height: 100%; object-fit: contain;" alt="Photo">

                <div id="qualitySelector" class="quality-wrapper" style="display: none; bottom: 64px; right: 16px;">
                    <button class="quality-btn" id="qualityBtn" title="Quality">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                        <span id="qualityCurrent">Original</span>
                    </button>
                    <div class="quality-menu" id="qualityMenu"></div>
                </div>
            </div>
            <div class="share-info">
                <h1 id="shareTitle">Loading...</h1>
                <div class="share-meta" id="shareMeta"></div>
                <a class="download-btn" id="downloadBtn" download>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Download
                </a>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
    <script>
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(2) + ' GB';
        }

        (function () {
            const pathParts = window.location.pathname.split('/');

            // Определяем, это ссылка на видео или видео внутри папки
            // /s/:shareId
            // /s/f/:shareId/v/:videoId
            let apiUrl = '';
            let streamUrl = '';
            let qualitiesUrl = '';
            let filename = '';
            let isFolderVideo = false;
            let folderShareId = '';

            if (pathParts[2] === 'f' && pathParts[4] === 'v') {
                isFolderVideo = true;
                folderShareId = pathParts[3];
                const videoId = pathParts[5];
                apiUrl = `/api/share/folder/${folderShareId}/video/${videoId}`;
                streamUrl = `/api/share/folder/${folderShareId}/video/${videoId}/stream`;
                qualitiesUrl = `/api/share/folder/${folderShareId}/video/${videoId}/qualities`;
            } else {
                const shareId = pathParts[pathParts.length - 1];
                apiUrl = '/api/share/' + shareId;
                streamUrl = '/api/share/' + shareId + '/stream';
                qualitiesUrl = '/api/share/' + shareId + '/qualities';
            }

            fetch(apiUrl)
                .then(r => {
                    if (!r.ok) {
                        return r.json().then(err => { throw new Error(err.error || 'Not found'); }).catch(e => {
                            if (e.message) throw e;
                            throw new Error('Not found');
                        });
                    }
                    return r.json();
                })
                .then(video => {
                    document.getElementById('shareTitle').textContent = video.filename;

                    if (video.mime_type && video.mime_type.startsWith('image/')) {
                        document.getElementById('shareVideo').style.display = 'none';
                        const img = document.getElementById('shareImage');
                        img.style.display = 'block';
                        img.src = streamUrl;
                    } else {
                        document.getElementById('shareImage').style.display = 'none';
                        const vid = document.getElementById('shareVideo');
                        vid.style.display = 'block';

                        fetch(qualitiesUrl)
                            .then(r => r.json())
                            .then(qualities => {
                                if (qualities.length > 1) {
                                    const qs = document.getElementById('qualitySelector');
                                    const qm = document.getElementById('qualityMenu');
                                    const qc = document.getElementById('qualityCurrent');
                                    const qb = document.getElementById('qualityBtn');

                                    qs.style.display = 'block';
                                    let activeQuality = 'original';
                                    vid.src = streamUrl;

                                    const renderMenu = () => {
                                        qm.innerHTML = qualities.map(q => `
                                            <button class="quality-option ${activeQuality === q.value ? 'active' : ''}" data-val="${q.value}">
                                                ${q.label}
                                                ${activeQuality === q.value ? '✓' : ''}
                                            </button>
                                        `).join('');

                                        qm.querySelectorAll('.quality-option').forEach(btn => {
                                            btn.addEventListener('click', (e) => {
                                                const targetVal = e.target.getAttribute('data-val');
                                                const targetLabel = qualities.find(x => x.value === targetVal).label;

                                                if (activeQuality !== targetVal) {
                                                    const currentTime = vid.currentTime;
                                                    const isPaused = vid.paused;
                                                    activeQuality = targetVal;
                                                    qc.textContent = targetLabel;

                                                    vid.src = streamUrl + (targetVal === 'original' ? '' : '?q=' + targetVal);
                                                    vid.addEventListener('loadedmetadata', function onLoaded() {
                                                        vid.currentTime = currentTime;
                                                        if (!isPaused) vid.play();
                                                        vid.removeEventListener('loadedmetadata', onLoaded);
                                                    });
                                                    renderMenu();
                                                }
                                                qm.classList.remove('show');
                                            });
                                        });
                                    };

                                    renderMenu();

                                    qb.addEventListener('click', () => {
                                        qm.classList.toggle('show');
                                    });

                                    document.addEventListener('click', (e) => {
                                        if (!qs.contains(e.target)) {
                                            qm.classList.remove('show');
                                        }
                                    });
                                } else {
                                    vid.src = streamUrl;
                                }
                            })
                            .catch(() => {
                                vid.src = streamUrl;
                            });
                    }

                    document.getElementById('shareMeta').innerHTML =
                        '<span>' + formatSize(video.size) + '</span> • <span>' +
                        new Date(video.created_at).toLocaleDateString('en-US') + '</span>';
                    document.getElementById('downloadBtn').href = streamUrl;
                    document.title = video.filename + ' — ' + (window.siteTitle || 'Provideo Media Holding');

                    // ========== Навигация по свайпу / стрелкам ==========
                    if (isFolderVideo) {
                        const navPrev = document.getElementById('navPrev');
                        const navNext = document.getElementById('navNext');
                        const swipeHint = document.getElementById('swipeHint');

                        function navigateTo(targetId) {
                            window.location.href = `/s/f/${folderShareId}/v/${targetId}`;
                        }

                        if (video.prev_id) {
                            navPrev.classList.add('visible');
                            navPrev.addEventListener('click', () => navigateTo(video.prev_id));
                        }
                        if (video.next_id) {
                            navNext.classList.add('visible');
                            navNext.addEventListener('click', () => navigateTo(video.next_id));
                        }

                        // Клавиатура
                        document.addEventListener('keydown', (e) => {
                            if (e.key === 'ArrowLeft' && video.prev_id) navigateTo(video.prev_id);
                            if (e.key === 'ArrowRight' && video.next_id) navigateTo(video.next_id);
                        });

                        // Свайпы
                        let touchStartX = 0;
                        let touchStartY = 0;
                        document.addEventListener('touchstart', (e) => {
                            touchStartX = e.changedTouches[0].screenX;
                            touchStartY = e.changedTouches[0].screenY;
                        }, { passive: true });

                        document.addEventListener('touchend', (e) => {
                            const dx = e.changedTouches[0].screenX - touchStartX;
                            const dy = e.changedTouches[0].screenY - touchStartY;
                            if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return;
                            if (dx > 0 && video.prev_id) navigateTo(video.prev_id);
                            if (dx < 0 && video.next_id) navigateTo(video.next_id);
                        }, { passive: true });

                        // Подсказка о свайпе (показываем один раз)
                        if ((video.prev_id || video.next_id) && !sessionStorage.getItem('swipeHintShown')) {
                            swipeHint.classList.add('show');
                            setTimeout(() => {
                                swipeHint.classList.remove('show');
                            }, 3000);
                            sessionStorage.setItem('swipeHintShown', 'true');
                        }
                    }

                    if (!sessionStorage.getItem('attentionPopupShown')) {
                        const popup = document.createElement('div');
                        popup.innerHTML = `
                            <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px;">
                                <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; max-width: 600px; width: 100%; padding: 32px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                                    <h2 style="margin-top: 0; margin-bottom: 16px; color: var(--text-primary);">ՈՒՇԱԴՐՈՒԹՅՈՒՆ / ATTENTION</h2>
                                    <p style="font-size: 16px; line-height: 1.6; margin-bottom: 24px; color: var(--text-secondary);">
                                        Խնդրում ենք Ձեր ֆայլերը ներբեռնել ԵՐԿՈՒ ամսվա ընթացքում, քանի որ նշված ժամկետի ավարտից հետո հղումը այլևս հասանելի չի լինի։<br>Կրկին շնորհակալություն համագործակցության համար։<br><br>
                                        Please download your files within TWO months, as the link will no longer be available after this period.<br>Thank you again for your cooperation.
                                    </p>
                                    <button onclick="this.parentElement.parentElement.remove()" style="padding: 12px 32px; font-size: 16px; font-weight: 600; border-radius: 8px; border: none; background: #646cff; color: white; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#535bf2'" onmouseout="this.style.background='#646cff'">OK</button>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(popup);
                        sessionStorage.setItem('attentionPopupShown', 'true');
                    }
                })
                .catch(err => {
                    if (err.message === 'Link expired') {
                        document.querySelector('.share-main').innerHTML = `
                        <div class="share-error" style="max-width: 800px; margin: 0 auto; text-align: center; padding: 40px 20px;">
                            <p style="font-size: 16px; line-height: 1.6; margin-bottom: 24px; color: var(--text-primary); text-align: left;">
                                Հարգելի այցելու,<br><br>
                                Տեղեկացնում ենք, որ տվյալ հղման գործողության նախատեսված ժամկետն ավարտվել է և այն ներկայումս հասանելի չէ։<br>
                                Եթե դեռևս չեք հասցրել ներբեռնել Ձեր ֆայլերը, խնդրում ենք նկատի ունենալ, որ հղման ժամկետի ավարտից հետո 15 օրվա ընթացքում կարող եք ներբեռնել ։<br>
                                Ուստի խնդրում ենք կապ հաստատել մեզ հետ։<br><br>
                                Հարգանքներով՝<br>
                                PROVIDEO MEDIA HOLDING<br><br>
                                Dear Visitor,<br><br>
                                We would like to inform you that the provided link has expired and is currently unavailable.<br>
                                If you have not yet managed to download your files, please note that they remain available for download for 15 days following the link’s expiration.<br>
                                Therefore, we kindly ask you to contact us.<br><br>
                                Sincerely,<br>
                                PROVIDEO MEDIA HOLDING
                            </p>
                        </div>`;
                    } else {
                        document.querySelector('.share-main').innerHTML =
                            '<div class="share-error"><h2>File not found</h2><p>The link is invalid or the file has been removed</p></div>';
                    }
                });
        })();
    </script>
</body>

</html>
