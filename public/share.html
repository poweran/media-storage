<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Վիդեո — Media Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="app share-page">
        <header class="share-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                <span class="logo-text">Media Storage</span>
            </div>
        </header>

        <main class="share-main">
            <div class="share-player-wrap">
                <video id="shareVideo" controls autoplay>
                    Ձեր դիտարկիչը չի աջակցում վիդեոյի նվագարկումը։
                </video>
            </div>
            <div class="share-info">
                <h1 id="shareTitle">Բեռնվում է...</h1>
                <div class="share-meta" id="shareMeta"></div>
                <a class="download-btn" id="downloadBtn" download>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Ներբեռնել
                </a>
            </div>
        </main>
    </div>

    <script>
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' Б';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' КБ';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' МБ';
            return (bytes / 1073741824).toFixed(2) + ' ГБ';
        }

        (function () {
            const pathParts = window.location.pathname.split('/');
            const shareId = pathParts[pathParts.length - 1];

            fetch('/api/share/' + shareId)
                .then(r => {
                    if (!r.ok) throw new Error('Չի գտնվել');
                    return r.json();
                })
                .then(video => {
                    document.getElementById('shareTitle').textContent = video.filename;
                    document.getElementById('shareVideo').src = '/api/share/' + shareId + '/stream';
                    document.getElementById('shareMeta').innerHTML =
                        '<span>' + formatSize(video.size) + '</span> • <span>' +
                        new Date(video.created_at).toLocaleDateString('hy-AM') + '</span>';
                    document.getElementById('downloadBtn').href = '/api/share/' + shareId + '/stream';
                    document.title = video.filename + ' — Media Storage';
                })
                .catch(() => {
                    document.querySelector('.share-main').innerHTML =
                        '<div class="share-error"><h2>Վիդեոն չի գտնվել</h2><p>Հղումն անվավեր է կամ վիդեոն հեռացվել է</p></div>';
                });
        })();
    </script>
</body>

</html>
