<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder — Provideo Media Holding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .crumb {
            cursor: pointer;
            transition: color 0.2s;
        }

        .crumb:hover {
            color: var(--text-primary);
        }

        .crumb.active {
            color: var(--text-primary);
            pointer-events: none;
        }

        .crumb:not(:first-child)::before {
            content: '/';
            margin-right: 8px;
            color: var(--text-tertiary);
        }

        .share-folder-page .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            width: 100%;
        }

        .folder-header {
            margin-bottom: 32px;
        }

        .folder-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .folder-meta {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Reusing some classes from the main app for videos Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
        }

        .video-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-hover);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-tertiary);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: color 0.2s;
        }

        .video-thumb:hover {
            color: var(--primary-color);
        }

        .folder-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-tertiary);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: color 0.2s, background 0.2s;
        }

        .folder-thumb:hover {
            color: var(--primary-color);
            background: rgba(100, 108, 255, 0.1);
        }

        .folder-icon {
            width: 48px;
            height: 48px;
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            backdrop-filter: blur(4px);
        }

        .video-info {
            padding: 16px;
            flex-grow: 1;
        }

        .video-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .video-actions {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            background: var(--bg-primary);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
            font-size: 13px;
            gap: 6px;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-spacer {
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <div class="app share-folder-page">
        <header class="share-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                <span class="logo-text" id="logoText">Provideo Media Holding</span>
            </div>
        </header>

        <main class="main-content">
            <div class="folder-header">
                <div class="breadcrumbs" id="breadcrumbs">
                    <span class="crumb active">Loading...</span>
                </div>
                <h1 class="folder-title" id="folderTitle">Loading folder...</h1>
                <div class="folder-meta" id="folderMeta"></div>
            </div>

            <div id="contentGrid" class="videos-grid" style="display: none;"></div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48"
                    style="margin-bottom: 16px; opacity: 0.5;">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3 style="margin-bottom: 8px; color: var(--text-primary);">This folder is empty</h3>
            </div>

            <div id="errorState" class="empty-state" style="display: none;">
                <h3 style="margin-bottom: 8px; color: var(--danger);">Error</h3>
                <p id="errorText">The link is invalid or the folder has been removed</p>
            </div>
        </main>
    </div>

    <!-- We load app.js for utility functions like formatSize and escapeHtml -->
    <script src="/app.js"></script>
    <script>
        (function () {
            const pathParts = window.location.pathname.split('/');
            const shareId = pathParts[pathParts.length - 1]; // /s/f/:shareId
            let attentionShown = false;

            const urlParams = new URLSearchParams(window.location.search);
            const subfolderId = urlParams.get('subfolder_id');

            const contentGrid = document.getElementById('contentGrid');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');
            const errorText = document.getElementById('errorText');
            const breadcrumbsEl = document.getElementById('breadcrumbs');
            const folderTitleEl = document.getElementById('folderTitle');
            const folderMetaEl = document.getElementById('folderMeta');

            function loadFolder(targetSubId = null) {
                let url = '/api/share/folder/' + shareId;
                if (targetSubId) {
                    url += '?subfolder_id=' + targetSubId;
                }

                fetch(url)
                    .then(r => {
                        if (!r.ok) {
                            return r.json().then(err => { throw new Error(err.error || 'Not found'); });
                        }
                        return r.json();
                    })
                    .then(data => {
                        errorState.style.display = 'none';
                        const { folder, subfolders, videos, breadcrumbs, share_expires_at } = data;

                        // Заголовок
                        folderTitleEl.textContent = folder.name;
                        const totalItems = subfolders.length + videos.length;
                        folderMetaEl.textContent = totalItems + ' items';

                        // Хлебные крошки
                        let bcHtml = '';
                        breadcrumbs.forEach((bc, idx) => {
                            const isActive = idx === breadcrumbs.length - 1;
                            if (isActive) {
                                bcHtml += `<span class="crumb active">${escapeHtml(bc.name)}</span>`;
                            } else {
                                const q = idx === 0 ? '' : `?subfolder_id=${bc.id}`;
                                bcHtml += `<a href="/s/f/${shareId}${q}" class="crumb" style="text-decoration:none;">${escapeHtml(bc.name)}</a>`;
                            }
                        });
                        breadcrumbsEl.innerHTML = bcHtml;

                        // Обновляем URL без перезагрузки страницы (History API)
                        const newUrl = targetSubId ? `/s/f/${shareId}?subfolder_id=${targetSubId}` : `/s/f/${shareId}`;
                        window.history.pushState({ subId: targetSubId }, '', newUrl);

                        if (totalItems === 0) {
                            contentGrid.style.display = 'none';
                            emptyState.style.display = 'block';
                            return;
                        }

                        // Рендерим сетку
                        contentGrid.style.display = 'grid';
                        emptyState.style.display = 'none';

                        let html = '';

                        // Подпапки
                        html += subfolders.map(sub => `
                          <div class="video-card folder-card">
                            <a href="/s/f/${shareId}?subfolder_id=${sub.id}" class="folder-thumb" style="text-decoration: none;" onclick="event.preventDefault(); window.loadTargetFolder(${sub.id});">
                              <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                              </svg>
                            </a>
                            <div class="video-info">
                              <div class="video-name" title="${escapeHtml(sub.name)}">${escapeHtml(sub.name)}</div>
                              <div class="video-meta">
                                <span>Folder</span>
                                <span>${new Date(sub.created_at).toLocaleDateString()}</span>
                              </div>
                            </div>
                            <div class="video-actions">
                              <a href="/s/f/${shareId}?subfolder_id=${sub.id}" class="icon-btn" style="flex-grow: 1; justify-content: center;" onclick="event.preventDefault(); window.loadTargetFolder(${sub.id});">
                                Open
                              </a>
                            </div>
                          </div>
                        `).join('');

                        // Видео
                        html += videos.map(vid => {
                            const link = `/s/f/${shareId}/v/${vid.id}`;
                            const isImage = vid.mime_type && vid.mime_type.startsWith('image/');
                            return `
                              <div class="video-card">
                                <a href="${link}" class="video-thumb" style="text-decoration: none;">
                                  <div class="play-icon">
                                    ${isImage ?
                                    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                                         <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                         <circle cx="8.5" cy="8.5" r="1.5" />
                                         <polyline points="21 15 16 10 5 21" />
                                       </svg>`
                                    : `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                                         <polygon points="5 3 19 12 5 21 5 3"/>
                                       </svg>`
                                }
                                  </div>
                                </a>
                                <div class="video-info">
                                  <div class="video-name" title="${escapeHtml(vid.filename)}">${escapeHtml(vid.filename)}</div>
                                  <div class="video-meta">
                                    <span>${formatSize(vid.size)}</span>
                                    <span>${new Date(vid.created_at).toLocaleDateString()}</span>
                                  </div>
                                </div>
                                <div class="video-actions">
                                  <a href="${link}" class="icon-btn" style="flex-grow: 1; justify-content: center;">
                                    ${isImage ? 'View Photo' : 'Watch Video'}
                                  </a>
                                  <a href="/api/share/folder/${shareId}/video/${vid.id}/stream" class="icon-btn" title="Download" download="${escapeHtml(vid.filename)}">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                      <polyline points="7 10 12 15 17 10" />
                                      <line x1="12" y1="15" x2="12" y2="3" />
                                    </svg>
                                  </a>
                                </div>
                              </div>
                            `;
                        }).join('');

                        contentGrid.innerHTML = html;

                        // Title документа
                        const siteTitle = window.siteTitle || 'Provideo Media Holding';
                        document.title = `${folder.name} — ${siteTitle}`;
                        document.getElementById('logoText').textContent = siteTitle;

                        if (!attentionShown && share_expires_at) {
                            attentionShown = true;
                            const popup = document.createElement('div');
                            popup.innerHTML = `
                                <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px;">
                                    <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; max-width: 600px; width: 100%; padding: 32px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                                        <h2 style="margin-top: 0; margin-bottom: 16px; color: var(--text-primary);">ՈՒՇԱԴՐՈՒԹՅՈՒՆ / ATTENTION</h2>
                                        <p style="font-size: 16px; line-height: 1.6; margin-bottom: 24px; color: var(--text-secondary);">
                                        Խնդրում ենք Ձեր ֆայլերը ներբեռնել մինչև <strong>${new Date(share_expires_at).toLocaleDateString('am-AM')}</strong>, քանի որ նշված ժամկետի ավարտից հետո հղումը այլևս հասանելի չի լինի։<br>Կրկին շնորհակալություն համագործակցության համար։<br><br>
                                        Please download your files within <strong>${new Date(share_expires_at).toLocaleDateString('en-US')}</strong>, as the link will no longer be available after this period.<br>Thank you again for your cooperation.
                                        </p>
                                        <button onclick="this.parentElement.parentElement.remove()" style="padding: 12px 32px; font-size: 16px; font-weight: 600; border-radius: 8px; border: none; background: #646cff; color: white; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#535bf2'" onmouseout="this.style.background='#646cff'">OK</button>
                                    </div>
                                </div>
                            `;
                            document.body.appendChild(popup);
                        }
                    })
                    .catch(e => {
                        contentGrid.style.display = 'none';
                        emptyState.style.display = 'none';
                        errorState.style.display = 'block';
                        folderTitleEl.textContent = 'Error';
                        folderMetaEl.textContent = '';
                        breadcrumbsEl.innerHTML = '';

                        if (e.message === 'Link expired') {
                            errorState.innerHTML = `
                            <div style="text-align: left; margin: 0 auto; max-width: 800px;">
                                <p style="font-size: 16px; line-height: 1.6; color: var(--text-primary);">
                                    Հարգելի այցելու,<br><br>
                                    Տեղեկացնում ենք, որ տվյալ հղման գործողության նախատեսված ժամկետն ավարտվել է և այն ներկայումս հասանելի չէ։<br>
                                    Եթե դեռևս չեք հասցրել ներբեռնել Ձեր ֆայլերը, խնդրում ենք նկատի ունենալ, որ հղման ժամկետի ավարտից հետո 15 օրվա ընթացքում կարող եք ներբեռնել ։<br>
                                    Ուստի խնդրում ենք կապ հաստատել մեզ հետ։<br><br>
                                    Հարգանքներով՝<br>
                                    PROVIDEO MEDIA HOLDING<br><br>
                                    Dear Visitor,<br><br>
                                    We would like to inform you that the provided link has expired and is currently unavailable.<br>
                                    If you have not yet managed to download your files, please note that they remain available for download for 15 days following the link's expiration.<br>
                                    Therefore, we kindly ask you to contact us.<br><br>
                                    Sincerely,<br>
                                    PROVIDEO MEDIA HOLDING
                                </p>
                            </div>`;
                        } else {
                            errorState.innerHTML = `<h3 style="margin-bottom: 8px; color: var(--danger);">Error</h3><p id="errorText">${escapeHtml(e.message)}</p>`;
                        }
                    });
            }

            // Глобальная функция для вызова из онкликов крошек или карточек
            window.loadTargetFolder = function (id) {
                loadFolder(id);
            };

            // Обработка кнопки "Назад" в браузере (History API)
            window.addEventListener('popstate', (e) => {
                if (e.state) {
                    loadFolder(e.state.subId);
                } else {
                    const u = new URLSearchParams(window.location.search);
                    loadFolder(u.get('subfolder_id'));
                }
            });

            // Инициальная загрузка
            loadFolder(subfolderId);
        })();
    </script>
</body>

</html>
