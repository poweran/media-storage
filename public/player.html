<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player — Provideo Media Holding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="app player-page">
        <header class="player-header">
            <a href="/" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Back
            </a>
            <h1 class="player-title" id="playerTitle">Loading...</h1>
            <div class="player-actions">
                <button class="icon-btn" id="shareBtn" title="Share">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="18" cy="5" r="3" />
                        <circle cx="6" cy="12" r="3" />
                        <circle cx="18" cy="19" r="3" />
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                    </svg>
                </button>
                <a href="" class="icon-btn" id="playerDownloadBtn" title="Download" download>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                </a>
            </div>
        </header>

        <main class="player-main" style="position: relative;">
            <video id="videoPlayer" controls autoplay style="display: none;">
                Your browser does not support video playback.
            </video>
            <img id="imageViewer"
                style="display: none; max-width: 100%; max-height: 100vh; object-fit: contain; margin: 0 auto; display: block;"
                alt="Photo">

            <div id="qualitySelector" class="quality-wrapper" style="display: none;">
                <button class="quality-btn" id="qualityBtn" title="Quality">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    <span id="qualityCurrent">Original</span>
                </button>
                <div class="quality-menu" id="qualityMenu"></div>
            </div>
        </main>

        <footer class="player-footer">
            <div class="player-info" id="playerInfo"></div>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/app.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) { window.location.href = '/'; return; }

            fetch('/api/videos/' + id)
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.json();
                })
                .then(video => {
                    if (!video) { window.location.href = '/'; return; }

                    document.getElementById('playerTitle').textContent = video.filename;

                    if (video.mime_type && video.mime_type.startsWith('image/')) {
                        document.getElementById('videoPlayer').style.display = 'none';
                        const img = document.getElementById('imageViewer');
                        img.style.display = 'block';
                        img.src = '/api/stream/' + id;
                    } else {
                        document.getElementById('imageViewer').style.display = 'none';
                        const vid = document.getElementById('videoPlayer');
                        vid.style.display = 'block';

                        fetch('/api/videos/' + id + '/qualities')
                            .then(r => r.json())
                            .then(qualities => {
                                if (qualities.length > 1) {
                                    const qs = document.getElementById('qualitySelector');
                                    const qm = document.getElementById('qualityMenu');
                                    const qc = document.getElementById('qualityCurrent');
                                    const qb = document.getElementById('qualityBtn');

                                    qs.style.display = 'block';
                                    let activeQuality = 'original';
                                    vid.src = '/api/stream/' + id;

                                    const renderMenu = () => {
                                        qm.innerHTML = qualities.map(q => `
                                            <button class="quality-option ${activeQuality === q.value ? 'active' : ''}" data-val="${q.value}">
                                                ${q.label}
                                                ${activeQuality === q.value ? '✓' : ''}
                                            </button>
                                        `).join('');

                                        qm.querySelectorAll('.quality-option').forEach(btn => {
                                            btn.addEventListener('click', (e) => {
                                                const targetVal = e.target.getAttribute('data-val');
                                                const targetLabel = qualities.find(x => x.value === targetVal).label;

                                                if (activeQuality !== targetVal) {
                                                    const currentTime = vid.currentTime;
                                                    const isPaused = vid.paused;
                                                    activeQuality = targetVal;
                                                    qc.textContent = targetLabel;

                                                    vid.src = '/api/stream/' + id + (targetVal === 'original' ? '' : '?q=' + targetVal);
                                                    vid.addEventListener('loadedmetadata', function onLoaded() {
                                                        vid.currentTime = currentTime;
                                                        if (!isPaused) vid.play();
                                                        vid.removeEventListener('loadedmetadata', onLoaded);
                                                    });
                                                    renderMenu();
                                                }
                                                qm.classList.remove('show');
                                            });
                                        });
                                    };

                                    renderMenu();

                                    qb.addEventListener('click', () => {
                                        qm.classList.toggle('show');
                                    });

                                    document.addEventListener('click', (e) => {
                                        if (!qs.contains(e.target)) {
                                            qm.classList.remove('show');
                                        }
                                    });
                                } else {
                                    vid.src = '/api/stream/' + id;
                                }
                            })
                            .catch(() => {
                                vid.src = '/api/stream/' + id;
                            });
                    }

                    document.getElementById('playerInfo').innerHTML =
                        '<span>' + formatSize(video.size) + '</span>' +
                        '<span>' + new Date(video.created_at).toLocaleDateString('en-US') + '</span>';
                    document.title = video.filename + ' — ' + (window.siteTitle || 'Provideo Media Holding');

                    const downloadBtn = document.getElementById('playerDownloadBtn');
                    downloadBtn.href = '/api/stream/' + id;
                    downloadBtn.setAttribute('download', video.filename);

                    // Share button
                    const shareBtn = document.getElementById('shareBtn');
                    const updateShareBtn = (isShared) => {
                        if (isShared) shareBtn.classList.add('shared');
                        else shareBtn.classList.remove('shared');
                    };

                    updateShareBtn(video.is_shared);

                    shareBtn.addEventListener('click', async (e) => {
                        // We need to know if it's currently shared
                        const currentRes = await fetch('/api/videos/' + id);
                        const currentVideo = await currentRes.json();

                        if (currentVideo.is_shared) {
                            toggleShareMenu(e, id, false);
                        } else {
                            await toggleShare(id);
                        }
                    });

                    // Add menu to the DOM
                    const shareContainer = shareBtn.parentElement;
                    shareContainer.classList.add('share-container');
                    const menu = document.createElement('div');
                    menu.className = 'share-menu';
                    menu.id = `share-menu-v-${id}`;
                    menu.innerHTML = `
                        <button class="icon-btn" onclick="copyShareLink(${id}, false)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            copy
                        </button>
                        <button class="icon-btn danger" onclick="unshareItem(${id}, false)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                            unshare
                        </button>
                    `;
                    shareContainer.appendChild(menu);
                });
        })();
    </script>
</body>

</html>
