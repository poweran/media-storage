<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Մուտք — Media Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 380px;
            max-width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .login-logo svg {
            width: 32px;
            height: 32px;
            color: var(--accent);
        }

        .login-logo span {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
        }

        .login-tab.active {
            border-bottom-color: var(--accent);
            color: var(--text-primary);
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .login-field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition);
            box-sizing: border-box;
        }

        .login-field input:focus {
            border-color: var(--accent);
        }

        .login-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            margin-top: 8px;
        }

        .login-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <div class="app login-page">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7" />
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                </svg>
                <span>Media Storage</span>
            </div>

            <div class="login-tabs">
                <button class="login-tab active" id="tabLogin">Մուտք</button>
                <button class="login-tab" id="tabRegister">Գրանցում</button>
            </div>

            <form id="authForm">
                <div class="login-error" id="loginError">Սխալ անուն կամ գաղտնաբառ</div>
                <div class="login-field">
                    <label for="username">Անուն (Օգտանուն)</label>
                    <input type="text" id="username" name="username" placeholder="Մուտքագրեք անունը" autofocus required>
                </div>
                <div class="login-field">
                    <label for="password">Գաղտնաբառ</label>
                    <input type="password" id="password" name="password" placeholder="Մուտքագրեք գաղտնաբառը" required>
                </div>
                <button type="submit" class="login-submit" id="submitBtn">Մուտք</button>
            </form>
        </div>
    </div>
    <script>
        let isLogin = true;
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const submitBtn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('loginError');

        tabLogin.addEventListener('click', () => {
            isLogin = true;
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            submitBtn.textContent = 'Մուտք';
            errorEl.style.display = 'none';
            document.title = 'Մուտք — Media Storage';
        });

        tabRegister.addEventListener('click', () => {
            isLogin = false;
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            submitBtn.textContent = 'Գրանցվել';
            errorEl.style.display = 'none';
            document.title = 'Գրանցում — Media Storage';
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            errorEl.style.display = 'none';

            const endpoint = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
                    window.location.href = redirect;
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.error || 'Սխալ';
                    errorEl.style.display = 'block';
                    if (isLogin) {
                        document.getElementById('password').value = '';
                        document.getElementById('password').focus();
                    }
                }
            } catch (err) {
                errorEl.textContent = 'Ցանցի սխալ';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
